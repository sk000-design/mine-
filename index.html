<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Love Page</title>

<style>
html,body{
    margin:0;
    height:100%;
    overflow:hidden;
}

.bg_heart{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    overflow:hidden;
    background-image:url("https://i.pinimg.com/originals/51/d8/37/51d8374126446d495348b6032202126f.jpg");
    background-size:cover;
    z-index:-1;
}

.container{
    position:absolute;
    top:0;
    left:0;
    height:100%;
    width:100%;
    display:flex;
    align-items:center;
    justify-content:center;
    text-align:center;
    color:white;
    font-family:cursive;
    font-size:28px;
    padding:20px;
}

.heart{
    position:absolute;
    transform:rotate(-45deg);
    animation:love linear forwards;
}
.heart:before,
.heart:after{
    content:"";
    position:absolute;
    width:100%;
    height:100%;
    background:inherit;
    border-radius:50%;
}
.heart:before{
    top:-50%;
    left:0;
}
.heart:after{
    left:50%;
    top:0;
}

@keyframes love{
    0%{top:110%;opacity:1;}
    100%{top:-10%;opacity:0;}
}
</style>
</head>

<body>

<div class="bg_heart"></div>

<div class="container">
    <h2 id="text1"></h2>
</div>

<script>
// Floating hearts
setInterval(function(){
    var r_size = Math.floor(Math.random() * 60) + 10;
    var r_left = Math.floor(Math.random() * 100);
    var r_bg = Math.floor(Math.random() * 25) + 100;
    var r_time = Math.floor(Math.random() * 5) + 5;

    var heart = document.createElement("div");
    heart.className = "heart";
    heart.style.width = r_size + "px";
    heart.style.height = r_size + "px";
    heart.style.left = r_left + "%";
    heart.style.background = "rgba(255,"+(r_bg-25)+","+r_bg+",1)";
    heart.style.animationDuration = r_time + "s";

    document.querySelector(".bg_heart").appendChild(heart);

    setTimeout(function(){
        heart.remove();
    }, r_time * 1000);

}, 500);

// Typing text
var i = 0;
var txt1 = "Hi SweetHeart.....! < I Love You ❤️ < Give me One chance to Prove my Love ...!";
var speed = 50;

function typeWriter() {
    if (i < txt1.length) {
        if(txt1.charAt(i) == "<")
            document.getElementById("text1").innerHTML += "<br>";
        else
            document.getElementById("text1").innerHTML += txt1.charAt(i);
        i++;
        setTimeout(typeWriter, speed);
    }
}

typeWriter();
</script>

</body>
</html>
